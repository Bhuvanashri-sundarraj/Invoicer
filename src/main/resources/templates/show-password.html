<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface-2: #16161f;
            --border: rgba(255,255,255,0.07);
            --gold: #c9a84c;
            --gold-light: #e4c67a;
            --gold-dim: rgba(201,168,76,0.1);
            --text: #f0ede8;
            --text-muted: rgba(240,237,232,0.45);
        }

        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 55% at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(100,80,180,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Top Bar ─── */
        .topbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 22px 60px;
            border-bottom: 1px solid var(--border);
            animation: fadeDown 0.5s ease both;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-mark svg { width: 30px; height: 30px; }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text);
        }

        /* ─── Main ─── */
        .main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        /* ─── Card ─── */
        .card {
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .card-eyebrow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.7rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            opacity: 0.8;
        }

        .card-eyebrow span {
            width: 20px;
            height: 1px;
            background: var(--gold);
            opacity: 0.5;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 36px;
        }

        .card-title em {
            font-style: italic;
            color: var(--gold-light);
        }

        .card-body {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 36px 32px;
        }

        /* ─── Lock icon ─── */
        .icon-wrap {
            width: 52px;
            height: 52px;
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            background: var(--gold-dim);
        }

        .icon-wrap svg {
            width: 22px;
            height: 22px;
            stroke: var(--gold);
            fill: none;
        }

        /* ─── Password display ─── */
        .password-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .password-box {
            background: var(--surface-2);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 3px;
            padding: 14px 20px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: var(--gold-light);
            margin-bottom: 28px;
            word-break: break-all;
        }

        /* ─── Note ─── */
        .note {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(224,112,112,0.07);
            border: 1px solid rgba(224,112,112,0.18);
            border-radius: 3px;
            padding: 12px 14px;
            text-align: left;
            margin-bottom: 0;
        }

        .note svg {
            width: 14px;
            height: 14px;
            stroke: #e07070;
            fill: none;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .note p {
            font-size: 0.75rem;
            color: rgba(224,112,112,0.85);
            line-height: 1.6;
        }

        /* ─── Footer link ─── */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        a {
            font-size: 0.78rem;
            color: var(--gold);
            text-decoration: none;
            opacity: 0.7;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }

        a:hover { opacity: 1; }

        /* ─── Page Footer ─── */
        .footer {
            position: relative;
            z-index: 1;
            padding: 22px 60px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-left { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.05em; }
        .footer-dots { display: flex; gap: 6px; }
        .footer-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
        .footer-dots span:first-child { background: var(--gold); opacity: 0.5; }

        /* ─── Animations ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .topbar, .footer { padding: 18px 20px; }
            .card-body { padding: 28px 20px; }
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
    <a href="/" class="logo">
        <div class="logo-mark">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="1" width="30" height="30" rx="2" stroke="#c9a84c" stroke-width="1"/>
                <path d="M8 10h16M8 16h10M8 22h12" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="24" cy="22" r="3" fill="#c9a84c" opacity="0.5"/>
            </svg>
        </div>
        <span class="logo-text">Invoicer</span>
    </a>
</header>

<!-- Main -->
<main class="main">
    <div class="card">

        <div class="card-eyebrow"><span></span> Account Recovery <span></span></div>
        <h1 class="card-title">Your <em>Password</em></h1>

        <div class="card-body">

            <div class="icon-wrap">
                <svg viewBox="0 0 24 24" stroke-width="1.6" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="11" width="18" height="11" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <p class="password-label">Your Password Is</p>
            <div class="password-box" th:text="${password}"></div>

            <div class="note">
                <svg viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="12" y1="9" x2="12" y2="13" stroke-linecap="round"/>
                    <line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round"/>
                </svg>
                <p>Please note this down and keep it safe. Do not share your password with anyone.</p>
            </div>

        </div>

        <div class="card-footer">
            <a href="/login">← Back to Login</a>
        </div>

    </div>
</main>

<!-- Footer -->
<footer class="footer">
    <div class="footer-left">© 2025 Invoicer &nbsp;·&nbsp; Account Recovery</div>
    <div class="footer-dots"><span></span><span></span><span></span></div>
</footer>

</body>
</html>
