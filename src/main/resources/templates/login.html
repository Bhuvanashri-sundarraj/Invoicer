<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - GST Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface-2: #16161f;
            --border: rgba(255,255,255,0.07);
            --border-focus: rgba(201,168,76,0.5);
            --gold: #c9a84c;
            --gold-light: #e4c67a;
            --gold-dim: rgba(201,168,76,0.1);
            --text: #f0ede8;
            --text-muted: rgba(240,237,232,0.45);
            --text-sub: rgba(240,237,232,0.22);
            --error: #e07070;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 55% 55% at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(100,80,180,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Grid texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Top Bar ─── */
        .topbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 22px 60px;
            border-bottom: 1px solid var(--border);
            animation: fadeDown 0.5s ease both;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-mark svg { width: 30px; height: 30px; }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text);
        }

        /* ─── Main ─── */
        .main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        /* ─── Card ─── */
        .card {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        /* Eyebrow */
        .card-eyebrow {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            opacity: 0.8;
        }

        .card-eyebrow span {
            width: 20px;
            height: 1px;
            background: var(--gold);
            opacity: 0.5;
        }

        /* Title */
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 36px;
        }

        .card-title em {
            font-style: italic;
            color: var(--gold-light);
        }

        /* Card body */
        .card-body {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 36px 32px;
        }

        /* Form groups */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-bottom: 18px;
        }

        .form-group:last-of-type {
            margin-bottom: 24px;
        }

        label {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            padding: 11px 14px;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--border-focus);
            background: rgba(201,168,76,0.04);
        }

        input::placeholder {
            color: var(--text-sub);
        }

        /* Submit button */
        button[type="submit"] {
            width: 100%;
            background: var(--gold);
            border: none;
            color: #0a0a0f;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 13px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        button[type="submit"]:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* Footer links */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        a {
            font-size: 0.78rem;
            color: var(--gold);
            text-decoration: none;
            opacity: 0.7;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }

        a:hover { opacity: 1; }

        /* Error */
        .error {
            margin-top: 16px;
            font-size: 0.78rem;
            color: var(--error);
            text-align: center;
            min-height: 1em;
            letter-spacing: 0.03em;
        }

        /* ─── Page Footer ─── */
        .footer {
            position: relative;
            z-index: 1;
            padding: 22px 60px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-left { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.05em; }
        .footer-dots { display: flex; gap: 6px; }
        .footer-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
        .footer-dots span:first-child { background: var(--gold); opacity: 0.5; }

        /* ─── Animations ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .topbar { padding: 18px 20px; }
            .footer  { padding: 18px 20px; }
            .card-body { padding: 28px 20px; }
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
    <a href="/" class="logo">
        <div class="logo-mark">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="1" width="30" height="30" rx="2" stroke="#c9a84c" stroke-width="1"/>
                <path d="M8 10h16M8 16h10M8 22h12" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="24" cy="22" r="3" fill="#c9a84c" opacity="0.5"/>
            </svg>
        </div>
        <span class="logo-text">Invoicer</span>
    </a>
</header>

<!-- Main -->
<main class="main">
    <div class="card">

        <div class="card-eyebrow"><span></span> Secure Access <span></span></div>
        <h1 class="card-title">Welcome <em>Back</em></h1>

        <div class="card-body">
            <form action="/login" method="post">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit">Sign In</button>

            </form>

            <p class="error" th:text="${error}"></p>
        </div>

        <div class="card-footer">
            <a href="/forgot-password">Forgot Password?</a>
        </div>

    </div>
</main>

<!-- Footer -->
<footer class="footer">
    <div class="footer-left">© 2025 Invoicer &nbsp;·&nbsp; Secure Login</div>
    <div class="footer-dots"><span></span><span></span><span></span></div>
</footer>

</body>
</html>
